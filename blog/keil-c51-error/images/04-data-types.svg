<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#f8f8f8" rx="8"/>
  <text x="30" y="35" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">C51 基本数据类型（Base Data Types）</text>

  <!-- Header -->
  <rect x="30" y="50" width="160" height="30" fill="#9b59b6" rx="4"/>
  <text x="110" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">类型</text>
  <rect x="200" y="50" width="120" height="30" fill="#9b59b6" rx="4"/>
  <text x="260" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">位数</text>
  <rect x="330" y="50" width="340" height="30" fill="#9b59b6" rx="4"/>
  <text x="500" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">说明</text>

  <!-- bit -->
  <rect x="30" y="84" width="160" height="26" fill="#fce4ec" rx="4"/>
  <text x="110" y="102" font-family="Consolas,monospace" font-size="13" fill="#c2185b" text-anchor="middle">bit</text>
  <rect x="200" y="84" width="120" height="26" fill="#fce4ec" rx="4"/>
  <text x="260" y="102" font-family="Consolas,monospace" font-size="13" fill="#555" text-anchor="middle">1</text>
  <rect x="330" y="84" width="340" height="26" fill="#fff5f8" rx="4"/>
  <text x="500" y="102" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">位变量（0 或 1）｜不可用于指针和数组</text>

  <!-- unsigned char -->
  <rect x="30" y="113" width="160" height="26" fill="#e8f5e9" rx="4"/>
  <text x="110" y="131" font-family="Consolas,monospace" font-size="13" fill="#2e7d32" text-anchor="middle">unsigned char</text>
  <rect x="200" y="113" width="120" height="26" fill="#e8f5e9" rx="4"/>
  <text x="260" y="131" font-family="Consolas,monospace" font-size="13" fill="#555" text-anchor="middle">8</text>
  <rect x="330" y="113" width="340" height="26" fill="#f5fff5" rx="4"/>
  <text x="500" y="131" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">0 ~ 255｜常用作字符和计数器</text>

  <!-- signed char -->
  <rect x="30" y="142" width="160" height="26" fill="#e3f2fd" rx="4"/>
  <text x="110" y="160" font-family="Consolas,monospace" font-size="13" fill="#1565c0" text-anchor="middle">signed char</text>
  <rect x="200" y="142" width="120" height="26" fill="#e3f2fd" rx="4"/>
  <text x="260" y="160" font-family="Consolas,monospace" font-size="13" fill="#555" text-anchor="middle">8</text>
  <rect x="330" y="142" width="340" height="26" fill="#f0f7ff" rx="4"/>
  <text x="500" y="160" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">-128 ~ 127</text>

  <!-- unsigned int -->
  <rect x="30" y="171" width="160" height="26" fill="#fff3e0" rx="4"/>
  <text x="110" y="189" font-family="Consolas,monospace" font-size="13" fill="#e65100" text-anchor="middle">unsigned int</text>
  <rect x="200" y="171" width="120" height="26" fill="#fff3e0" rx="4"/>
  <text x="260" y="189" font-family="Consolas,monospace" font-size="13" fill="#555" text-anchor="middle">16</text>
  <rect x="330" y="171" width="340" height="26" fill="#fffef5" rx="4"/>
  <text x="500" y="189" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">0 ~ 65,535｜16 位无符号整数</text>
</svg>
