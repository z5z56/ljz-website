<svg xmlns="http://www.w3.org/2000/svg" width="700" height="200" viewBox="0 0 700 200">
  <rect width="700" height="200" fill="#f8f8f8" rx="8"/>
  <text x="30" y="35" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#333">C51 存储器类型（Memory Types）</text>

  <!-- Header row -->
  <rect x="30" y="50" width="180" height="30" fill="#9b59b6" rx="4"/>
  <text x="120" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">类型</text>
  <rect x="220" y="50" width="300" height="30" fill="#9b59b6" rx="4"/>
  <text x="370" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">说明</text>
  <rect x="530" y="50" width="140" height="30" fill="#9b59b6" rx="4"/>
  <text x="600" y="70" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">对应区域</text>

  <!-- Row 1 -->
  <rect x="30" y="82" width="180" height="28" fill="#f0e6f5" rx="4"/>
  <text x="120" y="101" font-family="Consolas,monospace" font-size="13" fill="#7d3c98" text-anchor="middle">data</text>
  <rect x="220" y="82" width="300" height="28" fill="#f5f0fa" rx="4"/>
  <text x="370" y="101" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">直接寻址｜访问速度快</text>
  <rect x="530" y="82" width="140" height="28" fill="#f5f0fa" rx="4"/>
  <text x="600" y="101" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">00H–7FH</text>

  <!-- Row 2 -->
  <rect x="30" y="112" width="180" height="28" fill="#e8f5e9" rx="4"/>
  <text x="120" y="131" font-family="Consolas,monospace" font-size="13" fill="#2e7d32" text-anchor="middle">bdata</text>
  <rect x="220" y="112" width="300" height="28" fill="#f5faf5" rx="4"/>
  <text x="370" y="131" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">可位寻址｜支持位操作</text>
  <rect x="530" y="112" width="140" height="28" fill="#f5faf5" rx="4"/>
  <text x="600" y="131" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">20H–2FH</text>

  <!-- Row 3 -->
  <rect x="30" y="142" width="180" height="28" fill="#e3f2fd" rx="4"/>
  <text x="120" y="161" font-family="Consolas,monospace" font-size="13" fill="#1565c0" text-anchor="middle">idata</text>
  <rect x="220" y="142" width="300" height="28" fill="#f0f7ff" rx="4"/>
  <text x="370" y="161" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">间接寻址｜高 128B RAM</text>
  <rect x="530" y="142" width="140" height="28" fill="#f0f7ff" rx="4"/>
  <text x="600" y="161" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="middle">80H–FFH</text>

  <!-- Row 4 -->
  <rect x="30" y="172" width="180" height="24" fill="#fff8e1" rx="4"/>
  <text x="120" y="189" font-family="Consolas,monospace" font-size="12" fill="#f57f17" text-anchor="middle">xdata / pdata</text>
  <rect x="220" y="172" width="300" height="24" fill="#fffef5" rx="4"/>
  <text x="370" y="189" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">外部扩展 RAM 访问</text>
  <rect x="530" y="172" width="140" height="24" fill="#fffef5" rx="4"/>
  <text x="600" y="189" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">0000H–FFFFH</text>
</svg>
