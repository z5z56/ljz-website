<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <rect width="800" height="220" fill="#1e1e1e" rx="8"/>
  <text x="30" y="45" font-family="Consolas,monospace" font-size="18" fill="#6a9955">// 定义数组</text>
  <text x="30" y="75" font-family="Consolas,monospace" font-size="18" fill="#569cd6">int</text>
  <text x="70" y="75" font-family="Consolas,monospace" font-size="18" fill="#9cdcfe"> data</text>
  <text x="160" y="75" font-family="Consolas,monospace" font-size="18" fill="#d4d4d4">[10]</text>
  <text x="230" y="75" font-family="Consolas,monospace" font-size="18" fill="#d4d4d4"> = {0};</text>

  <text x="30" y="115" font-family="Consolas,monospace" font-size="14" fill="#808080">//  👆 data 是 C51 保留关键字！(颜色相近，不明显)</text>

  <rect x="20" y="130" width="760" height="60" fill="#2d2d2d" rx="4" stroke="#c586c0" stroke-width="2"/>
  <text x="40" y="162" font-family="Consolas,monospace" font-size="15" fill="#ce9178">'data'</text>
  <text x="90" y="162" font-family="Consolas,monospace" font-size="15" fill="#d4d4d4"> is a </text>
  <text x="150" y="162" font-family="Consolas,monospace" font-size="15" fill="#569cd6">reserved keyword</text>
  <text x="340" y="162" font-family="Consolas,monospace" font-size="15" fill="#d4d4d4"> — Keil C51 Memory Type</text>
</svg>
